name: windenergy-citation
version: 2.0.0
description: >
  Declarative manifest for renewable citation support and final citation audit.

always_load:
  - ../_shared/core/output-run-folders.md
  - static/core/principles.md
  - static/core/workflow.md
  - static/core/chinese-mode.md

references:
  on_demand:
    - condition: claim to query strategy or support grading
      path: references/search-strategy.md
    - condition: preferred energy journal scope
      path: references/journal-scope.md
    - condition: RIS, EndNote, or BibTeX export
      path: references/ris-endnote.md
    - condition: strict citation audit, DOI screening, or export script usage
      path: scripts/windenergy_citation.py

