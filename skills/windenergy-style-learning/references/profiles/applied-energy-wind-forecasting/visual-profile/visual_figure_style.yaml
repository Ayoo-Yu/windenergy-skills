measurement_notes:
- ScienceDirect figure-object captions can be short title fragments; use the full-text
  caption profile for authoritative caption length and syntax.
- Panel cues derived from XML caption text can undercount visual multi-panel layouts.
style_rules:
  layout:
  - Use aspect ratios around 1.17 to 2.19 for comparable figures.
  color:
  - Keep most plotted ink dark or neutral, with restrained accent colors for method
    families.
  axes_and_grid:
  - Keep axis labels explicit with metric and unit whenever the display reports operating
    quantities.
  caption_handoff:
  - Use this visual profile for image-level layout, palette, and topic mix; use the
    full-text caption profile for caption length and sentence syntax.
