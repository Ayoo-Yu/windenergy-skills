name: windenergy-paper2ppt
version: 2.0.0
description: >
  Declarative manifest for renewable paper to Chinese PPTX workflows.

always_load:
  - ../_shared/core/output-run-folders.md
  - static/core/principles.md
  - static/core/workflow.md
  - static/core/output-and-quality.md

axes:
  task_mode:
    detect: |
      Detect whether the user needs a full journal-club deck, a short group
      meeting deck, or a figure-led teaching deck. Use full-deck by default.
    values:
      full-deck: static/fragments/task/full-deck.md
      short-talk: static/fragments/task/short-talk.md
      figure-led: static/fragments/task/figure-led.md
    default: full-deck
    multi: false

