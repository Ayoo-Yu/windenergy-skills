name: windenergy-data
version: 2.0.0
description: >
  Declarative manifest for renewable-energy data availability and FAIR checks.

always_load:
  - ../_shared/core/output-run-folders.md
  - static/core/stance.md
  - static/core/workflow.md
  - static/core/chinese-mode.md

references:
  on_demand:
    - condition: source basis or policy boundary
      path: references/source-basis.md
    - condition: Chinese author wording or bilingual statement
      path: references/chinese-author-alignment.md
    - condition: ready-to-adapt statement pattern
      path: references/statement-patterns.md
    - condition: repository, identifier, embargo, versioning, or citation
      path: references/repository-and-identifiers.md
    - condition: FAIR metadata, README, license, provenance, or DataCite fields
      path: references/fair-metadata-checklist.md
    - condition: journal data-sharing policy principle
      path: references/policy-principles.md

