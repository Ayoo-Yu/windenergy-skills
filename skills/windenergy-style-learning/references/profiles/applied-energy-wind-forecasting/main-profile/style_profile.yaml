constraints:
  writing:
  - Use the learned section order when it is compatible with the target journal instructions.
  - Make the energy-system value explicit before presenting algorithmic novelty.
  - Tie each major claim to a metric, unit, comparison baseline, or figure reference.
  - Target abstract length near 196 to 244 words for this profile.
  - For full Applied Energy wind-forecasting manuscripts, draft the Conclusion around
    500 to 700 words unless the evidence scope is narrow.
  polishing:
  - Preserve all supplied numbers, method names, datasets, and citations.
  - Replace audit-style wording with claim-first scientific prose when the evidence
    supports it.
  - Keep uncertainty and limitations visible when claims depend on subgroup or regime
    support.
  figures:
  - Make captions self-contained with metric, unit, sample definition, and main interpretation.
  - Keep panel order aligned with the claim sequence in the Results section.
  - Use consistent colors for method families across the manuscript.
  - Target figure caption length near 49 to 68 words when figure complexity is comparable.
  guardrails:
  - In Results and Discussion, reserve wind-forecasting importance statements for
    context. Start result claims with evidence-first templates such as <result_evidence>
    shows <finding_or_pattern>.
  - 'When unit templates are sparse, use fallback unit framing: kW, MW, and GW for
    power; kWh, MWh, and GWh for energy; h for forecast horizon or temporal resolution.'
  - Treat the learned Conclusion word-count distribution as extraction-sensitive when
    drafting full papers; do not compress a complete Conclusion only to match this
    corpus median.
  - Treat Methods median sentence P75 above 45 words as sentence-splitter noise; keep
    drafted long Methods sentences below about 35 words.
